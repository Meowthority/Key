<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEMOD - Generate Key</title>
    <style>
        :root {
            --bg-main: #0a0000; --box-bg: #150505; --border-color: #3d0c0c;
            --text-main: #f0f0f0; --text-muted: #888888; --accent-red: #d32f2f;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg-main); 
            color: var(--text-main); display: flex; justify-content: center; 
            align-items: center; height: 100vh; margin: 0; user-select: none;
        }
        .box { 
            background: var(--box-bg); padding: 35px 30px; border-radius: 12px; 
            border: 1px solid var(--border-color); text-align: center; 
            max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h2 { margin-top: 0; font-size: 22px; margin-bottom: 10px;}
        .desc { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
        
        input[type="text"] {
            width: 90%; padding: 12px; border-radius: 6px; 
            border: 1px solid var(--accent-red); background: #000; 
            color: #fff; font-size: 16px; text-align: center; margin-bottom: 15px;
            font-family: monospace; outline: none;
        }
        
        button {
            background-color: var(--accent-red); color: white; border: none;
            padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 6px;
            cursor: pointer; width: 100%; transition: 0.2s;
        }
        button:hover { background-color: #b71c1c; }

        .key-container { 
            background: #000; border: 1px dashed var(--accent-red); padding: 15px; 
            border-radius: 6px; margin: 20px 0; font-family: monospace; 
            font-size: 22px; font-weight: bold; color: #fff; user-select: all; 
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="box" id="contentBox">
        <h2 style="color: var(--accent-red);">Authenticating...</h2>
        <p class="desc">Please wait.</p>
    </div>

    <script>
        // Anti Inspect Element
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) return false;
        };

        // GANTI PASSWORD INI JIKA MAU
        var secretPassword = "X9vR2m_secure2024"; 

        window.onload = function() {
            var urlParams = new URLSearchParams(window.location.search);
            var token = urlParams.get('auth_ticket'); 
            var ref = document.referrer.toLowerCase();
            var contentBox = document.getElementById('contentBox');

            var isValid = (token === secretPassword) || ref.includes('safelinku') || ref.includes('sub4unlock');

            if (!isValid) {
                contentBox.innerHTML = `
                    <h2 style="color: var(--accent-red);">&#10060; Access Denied</h2>
                    <p class="desc">Direct links or bookmarks are blocked.</p>
                `;
            } else {
                // Berhasil Lewat Safelinku -> Hapus URL & Tampilkan Form HWID
                if (window.history.replaceState) {
                    window.history.replaceState(null, null, window.location.pathname);
                }
                showHwidForm();
            }
        };

        function showHwidForm() {
            var contentBox = document.getElementById('contentBox');
            contentBox.innerHTML = `
                <h2>Generate Device Key</h2>
                <p class="desc">Paste your <b>Device ID (HWID)</b> from the GameGuardian script below.</p>
                <input type="text" id="hwidInput" placeholder="UE-XXXXX-XXX" autocomplete="off">
                <button onclick="generateKey()">GENERATE KEY</button>
            `;
        }

        function generateKey() {
            var hwid = document.getElementById('hwidInput').value.trim().toUpperCase();
            if (hwid === "") {
                alert("Please paste your HWID first!");
                return;
            }

            // Hitung nilai HWID (sama persis dengan script Lua)
            var hwidNum = 0;
            for (var i = 0; i < hwid.length; i++) {
                hwidNum += hwid.charCodeAt(i);
            }

            var dateObj = new Date();
            var day = dateObj.getDate();
            var month = dateObj.getMonth() + 1;
            var year = dateObj.getFullYear();
            var magicNumber = 8877; 
            
            // RUMUS RAHASIA: (Hari * Tahun) + (Bulan * 8877) + (NilaiHWID * 3)
            var keyMath = (day * year) + (month * magicNumber) + (hwidNum * 3);
            var generatedKey = 'UEMOD-' + day + month + '-' + keyMath;

            var contentBox = document.getElementById('contentBox');
            contentBox.innerHTML = `
                <h2 style="color: #4CAF50;">&#10004; Success</h2>
                <p class="desc">Here is your private key. Do not share it, it will only work on your device.</p>
                <div class="key-container">` + generatedKey + `</div>
                <p class="desc" style="font-size: 12px; margin-bottom:0;">
                    Copy this key and paste it into the Mod Menu.
                </p>
            `;
        }
    </script>
</body>
</html>
