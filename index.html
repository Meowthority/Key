    <style>
        :root {
            --bg-main: #0a0000;
            --box-bg: #150505;
            --border-color: #3d0c0c;
            --text-main: #f0f0f0;
            --text-muted: #888888;
            --accent-red: #d32f2f;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .box { 
            background: var(--box-bg); 
            padding: 40px 35px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.03); 
            text-align: center; 
            max-width: 420px; 
            width: 90%; 
        }

        h2 { 
            margin-top: 0; 
            font-weight: 600; 
            font-size: 22px; 
            letter-spacing: 0.5px; 
        }

        .verifying { color: var(--text-main); }
        .error-title { color: var(--accent-red); margin-bottom: 10px; }
        .success-title { color: var(--text-main); border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        
        .desc { 
            color: var(--text-muted); 
            font-size: 14.5px; 
            line-height: 1.6; 
            margin-bottom: 20px; 
        }

        .key-container { 
            background: #000000; 
            border: 1px dashed var(--accent-red); 
            padding: 15px; 
            border-radius: 6px; 
            margin: 25px 0; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 24px; 
            font-weight: bold; 
            color: #ffffff; 
            letter-spacing: 2px; 
            user-select: all; /* Memudahkan user copy text */
        }

        /* Loading Animation */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(211, 47, 47, 0.2);
            border-radius: 50%;
            border-top-color: var(--accent-red);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
