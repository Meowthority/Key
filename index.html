<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEMOD - Daily Key</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #121212; color: white; padding: 50px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 0 15px rgba(0, 255, 128, 0.5); }
        .key { font-size: 24px; font-weight: bold; color: #00ff80; background: #2a2a2a; padding: 10px 20px; border-radius: 5px; margin-top: 15px; display: inline-block; }
        .error { color: #ff4c4c; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box" id="contentBox">
        <h2>Verifying your connection...</h2>
        <p>Please wait a moment.</p>
    </div>

    <script>
        setTimeout(() => {
            let referrer = document.referrer.toLowerCase();
            
            // Web yang diizinkan
            let isVerified = referrer.includes("sub4unlock") || referrer.includes("safelinku") || referrer.includes("youtube");

            let box = document.getElementById("contentBox");

            // PERBAIKAN: Jika TIDAK terverifikasi (termasuk jika referrer kosong/bookmark), langsung blokir!
            if (!isVerified) {
                box.innerHTML = `
                    <h2 class="error">❌ ACCESS DENIED!</h2>
                    <p>You cannot use Bookmarks or direct links to bypass the ad!</p>
                    <p>Please open the GameGuardian script and click <b>"GET FREE DAILY KEY"</b> to get today's password.</p>
                `;
            } 
            // JIKA USER DATANG DARI LINK YANG BENAR
            else {
                let today = new Date();
                let day = today.getDate();
                let month = today.getMonth() + 1; 
                let year = today.getFullYear();
                
                let secretSalt = 8877; 
                let calc = (day * year) + (month * secretSalt);
                let dailyKey = "UEMOD-" + day + month + "-" + calc;

                box.innerHTML = `
                    <h2>✅ Verification Success!</h2>
                    <p>Here is your Daily Key for today:</p>
                    <div class="key">${dailyKey}</div>
                    <p style="margin-top: 20px; font-size: 14px; color: #aaa;">Copy this key and paste it into the mod menu.</br>Key changes automatically every 24 hours.</p>
                `;
            }
        }, 1500); 
    </script>

</body>
</html>
